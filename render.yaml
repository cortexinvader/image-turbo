services:
  - type: web
    name: reverse-image-search
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        fromDatabase:
          name: reverse-image-search
          property: url
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
